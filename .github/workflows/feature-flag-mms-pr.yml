name: Feature Flag MMS PR Creation

on:
  pull_request:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    types: [opened, synchronize, reopened]
  push:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    branches:
      - main

jobs:
  setup:
    name: Setup Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install npm@11.16.0
        run: |
          npm install -g npm@11.16.0

      - name: Install Dependencies
        run: |
          npm -v
          npm ci
  add-comment-to-pr:
    name: Detect new feature flags and comment on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: setup
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Detect new feature flags
        id: detect
        run: node packages/compass-preferences-model/scripts/detect-new-feature-flags-for-mms.mts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Post or update comment on PR
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.detect.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- feature-flag-mms-comment -->';
            const body = marker + '\n' + process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  create-mms-pr:
    name: Create MMS PR
    runs-on: ubuntu-latest
    # TODO: Uncomment this after testing
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: setup
    steps:
      - name: Detect new feature flags
        id: detect
        run: node packages/compass-preferences-model/scripts/detect-new-feature-flags-for-mms.mts
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.event.after }}
      - name: Create Github App Token
        uses: mongodb-js/devtools-shared/actions/setup-bot-token@main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}
      - name: Checkout MMS
        uses: actions/checkout@v4
        with:
          repository: 10gen/mms
          token: ${{ steps.app-token.outputs.token }}
          path: mms
      - name: Add new feature flags to MMS
        run: |
          cd mms
          # sync/mongodb-js-compass-a2c4e6f
          BRANCH="sync/from-${SOURCE_REPO//\//-}-${SOURCE_SHA::7}"
          git checkout -b "$BRANCH"
          echo "${{ steps.detect.outputs.mms_pull_request_body }}" | jq -c '.[]' | while read -r flag; do
            filePath=$(echo "$flag" | jq -r '.filePath')
            config=$(echo "$flag" | jq -r '.config')
            echo "$config" > "$filePath"
            git add "$filePath"
          done
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # 7.0.5
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore: sync from ${SOURCE_REPO}@${SOURCE_SHA::7}'
          branch: ci/bump-packages
          # TODO: MMS styled PR title
          title: 'chore: sync from ${SOURCE_REPO}@${SOURCE_SHA::7}'
          labels: |
            bot
          author: '${{ steps.app-token.outputs.app-slug}}[bot] <${{ steps.app-token.outputs.app-email }}>'
          body: >-
            # Ticket

            // TODO: Extract ticket number from the main commit message and add it here

            # Description
            <p>This PR is autogenerated by <a href="https://github.com/mongodb-js/compass/actions/workflows/feature-flag-mms-pr.yml">
            feature-flag-mms-pr.yml</a> workflow when a feature flag is added to Compass.</p>
