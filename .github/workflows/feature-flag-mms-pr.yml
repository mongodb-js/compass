name: Feature Flag MMS PR Creation

on:
  pull_request:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    types: [opened, synchronize, reopened]
  push:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    branches:
      - main

jobs:
  detect-flags:
    name: Detect new feature flags
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      flags_count: ${{ steps.detect.outputs.flags_count }}
      comment_body: ${{ steps.detect.outputs.comment_body }}
      mms_pull_request_content: ${{ steps.detect.outputs.mms_pull_request_content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install npm
        run: npm install -g npm@11.16.0 typescript@5.9.3

      - name: Install Dependencies
        run: npm install typescript@5.9.3 --ignore-scripts

      - name: Detect new feature flags
        id: detect
        run: node packages/compass-preferences-model/scripts/detect-new-feature-flags-for-mms.mts
        env:
          # Different commit hashes are used depending on whether the workflow is triggered by a pull request or a push event (main).
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}

  add-comment-to-pr:
    name: Comment on PR with new feature flags
    needs: detect-flags
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.detect-flags.outputs.flags_count != '' && needs.detect-flags.outputs.flags_count != '0'
    permissions:
      pull-requests: write
    steps:
      - name: Post or update comment on PR
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ needs.detect-flags.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- feature-flag-mms-comment -->';
            const body = marker + '\n' + process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  create-mms-pr:
    name: Create MMS PR
    needs: detect-flags
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run it on push to main and if there are new feature flags detected
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-flags.outputs.flags_count != '' && needs.detect-flags.outputs.flags_count != '0'
    if: needs.detect-flags.outputs.flags_count != '' && needs.detect-flags.outputs.flags_count != '0'
    steps:
      - name: Create Github App Token
        uses: mongodb-js/devtools-shared/actions/setup-bot-token@main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}

      # TODO: Extend devtools-shared/actions/setup-bot-token to support
      # creating a token for a namespace (org/repo) so that we can directly
      # use it.
      - name: Create MMS Github App Token
        uses: actions/create-github-app-token@v1
        id: mms-app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}
          owner: 10gen
          repositories: mms
      - name: Checkout MMS
        uses: actions/checkout@v4
        with:
          repository: 10gen/mms
          token: ${{ steps.mms-app-token.outputs.token }}
          path: mms
      - name: Setup PR info
        id: pull-request-info
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # JIRA Ticket
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SOURCE_TEXT="$PR_TITLE"
          else
            SOURCE_TEXT="$COMMIT_MSG"
          fi

          TICKET=$(echo "$SOURCE_TEXT" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          if [ -z "$TICKET" ]; then
            TICKET="CLOUDP-XXXX"
          fi
          echo "ticket=${TICKET}" >> $GITHUB_OUTPUT

          # Branch Name
          REPO_SANITIZED="${{ github.repository }}"
          REPO_SANITIZED="${REPO_SANITIZED//\//-}"
          BRANCH_NAME="${TICKET}/${REPO_SANITIZED}-${{ github.sha }}"
          echo "name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          # Assign the PR to the author of the PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
          else
            AUTHOR="${{ github.event.head_commit.author.username }}"
          fi
          echo "assignee=${AUTHOR}" >> $GITHUB_OUTPUT

      - name: Add new feature flags to MMS
        env:
          MMS_FLAGS: ${{ needs.detect-flags.outputs.mms_pull_request_content }}
        run: |
          echo "$MMS_FLAGS" | jq -c '.[]' | while read -r flag; do
            filePath=$(echo "$flag" | jq -r '.filePath')
            config=$(echo "$flag" | jq -r '.config')
            printf '%s' "$config" > "mms/$filePath"
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # 7.0.5
        with:
          token: ${{ steps.mms-app-token.outputs.token }}
          path: mms
          sign-commits: true
          add-paths: feature-flags/definitions/developer-tools
          branch: ${{ steps.pull-request-info.outputs.name }}
          commit-message: 'sync feature flags from ${{ github.repository }}@${{ github.sha }}'
          title: '${{ steps.pull-request-info.outputs.ticket }}: Add feature flag config from Compass'
          assignees: '${{ steps.pull-request-info.outputs.assignee }}'
          author: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.app-email }}>'
          body: |
            Ticket: [${{ steps.pull-request-info.outputs.ticket }}](https://jira.mongodb.org/browse/${{ steps.pull-request-info.outputs.ticket }})

            ## Description

            This PR is autogenerated by the [feature-flag-mms-pr.yml](https://github.com/${{ github.repository }}/actions/workflows/feature-flag-mms-pr.yml)
            workflow when feature flags are added to Compass.

            **Source:** [${{ github.repository }}@${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
