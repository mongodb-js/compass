name: Feature Flag MMS PR Creation

on:
  pull_request:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    types: [opened, synchronize, reopened]

jobs:
  detect-and-comment:
    name: Detect new feature flags and comment on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    outputs:
      flags_count: ${{ steps.detect.outputs.flags_count }}
      new_flags: ${{ steps.detect.outputs.new_flags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1

      - name: Upgrade npm
        run: npm install --global npm@11.13.0
      - name: Install ts-node and typescript
        run: npm install --no-save --no-audit --ignore-scripts ts-node typescript

      - name: Detect new feature flags
        id: detect
        run: npx ts-node scripts/detect-new-feature-flags-for-mms.ts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Post comment on PR
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: actions/github-script@v7
        env:
          NEW_FLAGS: ${{ steps.detect.outputs.new_flags }}
        with:
          script: |
            const flags = JSON.parse(process.env.NEW_FLAGS || '[]');
            if (!flags.length) return;
            const { owner, repo } = context.repo;
            let body = '## New Feature Flag Definition(s) Detected\n\n';
            body += 'The following new feature flag(s) were added to `FEATURE_FLAG_DEFINITIONS` in `feature-flags.ts`:\n\n';
            for (const flag of flags) {
              body += `### \`${flag.name}\`\n`;
              if (flag.description) {
                body += `- **Description:** ${flag.description}\n`;
              } else {
                body += `- **Description:** _Not set._ Please add a description object with at least a short property to the feature flag definition in \`feature-flags.ts\` so it can be used in the MMS feature flag definition.\n`;
              }
              body += `- **Atlas Cloud Scope:** \`${flag.scope}\`\n`;
              body += '\n';
            }
            body += '---\n\n';

            body += '**As a follow up, create MMS feature flag PR for each new feature flag**. Steps:\n'
              body += `	1. Create a new file in the directory [feature-flags/definitions/developer-tools](https://github.com/10gen/mms/tree/master/feature-flags/definitions/developer-tools)\n`
              body += `	2. Add the contents of the feature flag definition to it. Here is the title and contents for the new flag(s):\n\n`

            for (const flag of flags) {
              body += `	File: [feature-flags/definitions/developer-tools](https://github.com/10gen/mms/tree/master/feature-flags/definitions/developer-tools)/data-explorer-compass-web-${flag.name}.yml\n`
              body += `	Contents:\n\n`
              body += '```yml\n';
              body += `name: mms.featureFlag.dataExplorerCompassWeb.${flag.name}\n`;
              body += `namespace: global\n`;
              body += `scope: ${flag.scope}\n`;
              body += `description: ${flag.description}\n`;
              body += `phases:\n`;
              body += `  local: enabled\n`;
              body += `  local-gov: disabled\n`;
              body += `  test: controlled\n`;
              body += `  test-gov: disabled\n`;
              body += `  dev: controlled\n`;
              body += `  dev-gov: disabled\n`;
              body += `  qa: controlled\n`;
              body += `  qa-gov: disabled\n`;
              body += `  stage: controlled\n`;
              body += `  prod: controlled\n`;
              body += `  prod-gov: disabled\n`;
              body += `  internal: disabled\n`;
              body += '```\n\n';
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });
