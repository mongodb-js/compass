name: Feature Flag MMS PR Creation

on:
  pull_request:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    types: [opened, synchronize, reopened]
  push:
    paths:
      - 'packages/compass-preferences-model/src/feature-flags.ts'
    branches:
      - main

jobs:
  add-comment-to-pr:
    name: Detect new feature flags and comment on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install npm@11.16.0
        run: npm install -g npm@11.16.0

      - name: Install Dependencies
        run: npm ci

      - name: Detect new feature flags
        id: detect
        run: node packages/compass-preferences-model/scripts/detect-new-feature-flags-for-mms.mts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Post or update comment on PR
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.detect.outputs.comment_body }}
        with:
          script: |
            const marker = '<!-- feature-flag-mms-comment -->';
            const body = marker + '\n' + process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  create-mms-pr:
    name: Create MMS PR
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Install npm@11.16.0
        run: npm install -g npm@11.16.0

      - name: Install Dependencies
        run: npm ci

      - name: Detect new feature flags
        id: detect
        run: node packages/compass-preferences-model/scripts/detect-new-feature-flags-for-mms.mts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # TODO: clear this switch
          # BASE_SHA: ${{ github.event.before }}
          # HEAD_SHA: ${{ github.event.after }}

      - name: Create Github App Token
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: mongodb-js/devtools-shared/actions/setup-bot-token@main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}

      - name: Create MMS Github App Token
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: actions/create-github-app-token@v1
        id: mms-app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}
          owner: 10gen
          repositories: mms

      - name: Checkout MMS
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: actions/checkout@v4
        with:
          repository: 10gen/mms
          token: ${{ steps.mms-app-token.outputs.token }}
          path: mms

      - name: Add new feature flags to MMS
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        env:
          MMS_FLAGS: ${{ steps.detect.outputs.mms_pull_request_body }}
        run: |
          cd mms
          echo "$MMS_FLAGS" | jq -c '.[]' | while read -r flag; do
            filePath=$(echo "$flag" | jq -r '.filePath')
            config=$(echo "$flag" | jq -r '.config')

            printf '%s' "$config" > "$filePath"
          done

      - name: Set branch name
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        id: branch
        run: |
          # Replace slashes with dashes for branch name
          REPO_SANITIZED="${{ github.repository }}"
          REPO_SANITIZED="${REPO_SANITIZED//\//-}"
          BRANCH_NAME="sync/from-${REPO_SANITIZED}-${{ github.sha }}"
          echo "name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.detect.outputs.flags_count != '' && steps.detect.outputs.flags_count != '0'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # 7.0.5
        with:
          token: ${{ steps.mms-app-token.outputs.token }}
          path: mms
          add-paths: .
          commit-message: 'chore: sync feature flags from ${{ github.repository }}@${{ github.sha }}'
          branch: ${{ steps.branch.outputs.name }}
          title: 'chore: sync feature flags from ${{ github.repository }}@${{ github.sha }}'
          labels: |
            bot
          author: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-token.outputs.app-email }}>'
          body: >-
            # Description

            This PR is autogenerated by the [feature-flag-mms-pr.yml](https://github.com/${{ github.repository }}/actions/workflows/feature-flag-mms-pr.yml)
            workflow when feature flags are added to Compass.

            **Source:** [${{ github.repository }}@${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ## Feature Flags Added

            This PR adds ${{ steps.detect.outputs.flags_count }} new feature flag configuration(s) to MMS.
